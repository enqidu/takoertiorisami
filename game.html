<body>

  <svg class="svg-defs" width="0" height="0" aria-hidden="true" style="position:absolute">
    <defs>
      <filter id="watercolor" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.022" numOctaves="1" seed="4" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="5"/>
      </filter>
      <filter id="fuzz" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" seed="2" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="4"/>
      </filter>
      <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="6"/>
        <feDisplacementMap in="SourceGraphic" scale="2.2"/>
      </filter>
      <symbol id="creature" viewBox="0 0 100 100">
        <g filter="url(#fuzz)" class="fuzz">
          <path d="M20 62 Q10 38 28 24 Q50 8 72 24 Q90 38 80 62 Q78 84 50 86 Q22 84 20 62 Z" fill="currentColor"/>
          <path d="M28 20 L24 10 L32 18 M40 14 L40 4 L44 14 M60 14 L60 4 L56 14 M72 20 L76 10 L68 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </g>
        <ellipse cx="38" cy="50" rx="7" ry="8" fill="#fffaed"/>
        <ellipse cx="62" cy="50" rx="7" ry="8" fill="#fffaed"/>
        <circle cx="39" cy="52" r="3" fill="#1a1410"/>
        <circle cx="63" cy="52" r="3" fill="#1a1410"/>
        <ellipse cx="50" cy="66" rx="4" ry="2.5" fill="#e4483b"/>
      </symbol>
      <symbol id="splat" viewBox="0 0 100 100">
        <g filter="url(#rough)">
          <path d="M50 10 Q70 18 78 34 Q96 42 86 60 Q92 78 70 82 Q58 96 42 86 Q22 94 14 74 Q-2 62 10 44 Q6 24 28 20 Q36 6 50 10 Z" fill="currentColor"/>
        </g>
      </symbol>
    </defs>
  </svg>

  <div class="cursor-creature" id="cursorCreature">
    <svg class="cc-svg" viewBox="0 0 100 100">
      <g class="cc-body">
        <g filter="url(#fuzz)">
          <path class="cc-shape" d="M20 62 Q10 38 28 24 Q50 8 72 24 Q90 38 80 62 Q78 84 50 86 Q22 84 20 62 Z" fill="currentColor"/>
          <path class="cc-spikes" d="M28 20 L24 10 L32 18 M40 14 L40 4 L44 14 M60 14 L60 4 L56 14 M72 20 L76 10 L68 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </g>
      </g>
      <g class="cc-face">
        <g class="cc-eye-l">
          <ellipse class="cc-eye" cx="38" cy="50" rx="7" ry="8" fill="#fffaed"/>
          <circle class="cc-pupil cc-pupil-l" cx="39" cy="52" r="3" fill="#1a1410"/>
        </g>
        <g class="cc-eye-r">
          <ellipse class="cc-eye" cx="62" cy="50" rx="7" ry="8" fill="#fffaed"/>
          <circle class="cc-pupil cc-pupil-r" cx="63" cy="52" r="3" fill="#1a1410"/>
        </g>
        <ellipse class="cc-mouth" cx="50" cy="66" rx="4" ry="2.5" fill="#e4483b"/>
      </g>
    </svg>
    <div class="cc-emote" id="ccEmote"></div>
    <div class="cc-swirl" id="ccSwirl"></div>
    <div class="cc-charge" id="ccCharge"></div>
    <div class="cc-say" id="ccSay"></div>
  </div>
  <div class="cursor-trail" id="cursorTrail"></div>
  <div class="cc-sparkles" id="ccSparkles"></div>

  <nav class="nav">
    <a href="index.html" class="site-name">Xelovneba</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">works</a>
      <a href="about.html" class="nav-link">tamar</a>
    </div>
  </nav>

  <main class="game-page">
    <header class="game-header">
      <h1 class="game-title">
        <span class="game-title-solid">match</span>
        <span class="game-title-outline">the paintings</span>
      </h1>
      <p class="game-sub">flip two cards. find the matching work. remember the creatures.</p>
    </header>

    <section class="game-hud">
      <div class="hud-pill hud-moves"><span class="hud-label">moves</span><span id="gameMoves">0</span></div>
      <div class="hud-pill hud-pairs"><span class="hud-label">found</span><span id="gamePairs">0</span></div>
      <div class="hud-pill hud-time"><span class="hud-label">time</span><span id="gameTime">0s</span></div>
      <div class="hud-pill hud-best"><span class="hud-label">best</span><span id="gameBest">—</span></div>
    </section>

    <section class="match-board" id="matchBoard" aria-label="memory cards"></section>

    <section class="game-controls">
      <button class="game-btn game-start" id="gameStart">
        <span class="btn-label">new round</span>
        <span class="btn-wiggle">→</span>
      </button>
      <p class="game-hint">tip: fewer moves = better score.</p>
    </section>

    <div class="game-over" id="gameOver">
      <div class="game-over-card">
        <h2 class="go-title"><span class="go-title-solid">you did it!</span></h2>
        <p class="go-score">finished in <span id="finalMoves">0</span> moves · <span id="finalTime">0s</span></p>
        <p class="go-msg" id="goMsg">not bad.</p>
        <button class="game-btn game-again" id="gameAgain">play again</button>
      </div>
    </div>
  </main>

  <script src="js/posts.js?v=20260473"></script>
